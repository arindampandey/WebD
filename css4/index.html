<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            background-color: aqua;
        }

        .box1 {
            color: yellow;
            padding: 10px;
            margin: 25px;
            border: 2px solid black;
            height: 200px;
            box-sizing: border-box;
        }

        .box2 {
            color: rebeccapurple;
            padding: 10px;
            margin: 25px;
            border: 2px solid red;
            height: 200px;
            box-sizing: border-box;
        }
        
        /* If two boxes include same margins so the margin is used only once between them and if they have different margins so the greater one is used between them. */

    </style>
</head>

<body>
    <div class="box box1">I am a box</div>
    <div class="box box2">I am another box</div>
</body>

</html>
